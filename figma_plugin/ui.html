<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Carousel Render Importer</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, sans-serif;
      }

      body {
        margin: 0;
        padding: 18px;
        background: #121212;
        color: #f3f3f3;
      }

      .stack {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .card {
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        padding: 14px;
        background: rgba(255, 255, 255, 0.04);
      }

      h1,
      h2,
      p,
      label {
        margin: 0;
      }

      h1 {
        font-size: 18px;
        font-weight: 700;
      }

      h2 {
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.72);
        margin-bottom: 8px;
      }

      p,
      label {
        font-size: 12px;
        line-height: 1.45;
        color: rgba(255, 255, 255, 0.78);
      }

      textarea,
      input[type="text"] {
        width: 100%;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(0, 0, 0, 0.32);
        color: inherit;
        padding: 12px;
        box-sizing: border-box;
      }

      textarea {
        min-height: 220px;
        resize: vertical;
        font: 12px/1.4 ui-monospace, SFMono-Regular, Consolas, monospace;
      }

      input[type="text"] {
        font: 12px/1.35 Inter, system-ui, sans-serif;
      }

      input[type="file"] {
        width: 100%;
      }

      .row {
        display: flex;
        gap: 10px;
      }

      .row.wrap {
        flex-wrap: wrap;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      button.primary {
        background: linear-gradient(135deg, #f7931a, #9e0e4c);
        color: white;
      }

      button.secondary {
        background: rgba(255, 255, 255, 0.08);
        color: inherit;
      }

      button.success {
        background: rgba(23, 92, 55, 0.42);
        color: #d6ffe7;
      }

      .status {
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 12px;
        line-height: 1.45;
        background: rgba(255, 255, 255, 0.05);
        color: rgba(255, 255, 255, 0.84);
      }

      .status.error {
        background: rgba(163, 24, 24, 0.22);
        color: #ffd6d6;
      }

      .status.success {
        background: rgba(23, 92, 55, 0.24);
        color: #d6ffe7;
      }

      .meta {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        font-size: 12px;
      }

      .meta div {
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.04);
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="stack">
      <div class="card stack">
        <h1>Carousel Render Importer</h1>
        <p>Upload or paste a <code>figma_plugin_payload_v2</code> JSON file, or let Auto Mode pull the next planned job from your local render bridge.</p>
      </div>

      <div class="card stack">
        <div class="field">
          <h2>Auto Render Bridge</h2>
          <label for="serverUrlInput">Render bridge URL</label>
          <input id="serverUrlInput" type="text" value="http://localhost:8765" />
        </div>
        <div class="row wrap">
          <button id="pollButton" class="secondary">Poll Next Job</button>
          <button id="autoButton" class="secondary">Start Auto Mode</button>
        </div>
      </div>

      <div class="card stack">
        <div class="field">
          <h2>Manual Payload Source</h2>
          <input id="fileInput" type="file" accept=".json,application/json" />
        </div>
        <textarea id="payloadInput" spellcheck="false" placeholder="Paste the .render.json payload here..."></textarea>
        <div class="row wrap">
          <button id="renderButton" class="primary">Render in Figma</button>
          <button id="formatButton" class="secondary">Format JSON</button>
        </div>
      </div>

      <div id="status" class="status">Waiting for payload.</div>

      <div id="resultCard" class="card stack hidden">
        <h2>Render Result</h2>
        <div id="resultMeta" class="meta"></div>
        <textarea id="resultOutput" spellcheck="false" readonly></textarea>
        <div class="row wrap">
          <button id="copyResultButton" class="secondary">Copy Result JSON</button>
          <button id="downloadResultButton" class="primary">Download Result JSON</button>
        </div>
      </div>
    </div>

    <script>
      const fileInput = document.getElementById("fileInput");
      const payloadInput = document.getElementById("payloadInput");
      const renderButton = document.getElementById("renderButton");
      const formatButton = document.getElementById("formatButton");
      const pollButton = document.getElementById("pollButton");
      const autoButton = document.getElementById("autoButton");
      const serverUrlInput = document.getElementById("serverUrlInput");
      const statusNode = document.getElementById("status");
      const resultCard = document.getElementById("resultCard");
      const resultMeta = document.getElementById("resultMeta");
      const resultOutput = document.getElementById("resultOutput");
      const copyResultButton = document.getElementById("copyResultButton");
      const downloadResultButton = document.getElementById("downloadResultButton");

      let latestResult = null;
      let currentBridgeJobId = null;
      let currentPayload = null;
      let isRendering = false;
      let autoMode = false;
      let autoTimer = null;

      function setStatus(text, variant) {
        statusNode.textContent = text;
        statusNode.className = "status";
        if (variant) {
          statusNode.classList.add(variant);
        }
      }

      function getServerUrl() {
        return serverUrlInput.value.trim().replace(/\/+$/, "");
      }

      function setAutoMode(nextState) {
        autoMode = nextState;
        autoButton.textContent = autoMode ? "Stop Auto Mode" : "Start Auto Mode";
        autoButton.className = autoMode ? "success" : "secondary";
      }

      function clearAutoTimer() {
        if (autoTimer) {
          clearTimeout(autoTimer);
          autoTimer = null;
        }
      }

      function scheduleAutoPoll(delayMs) {
        clearAutoTimer();
        if (!autoMode) {
          return;
        }
        autoTimer = setTimeout(() => {
          void pollNextJob();
        }, delayMs);
      }

      async function readFile(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ""));
          reader.onerror = () => reject(reader.error || new Error("Unable to read file."));
          reader.readAsText(file);
        });
      }

      function parsePayload() {
        const raw = payloadInput.value.trim();
        if (!raw) {
          throw new Error("Paste or upload a render payload first.");
        }
        const parsed = JSON.parse(raw);
        if (parsed.schema_version !== "figma_plugin_payload_v1" && parsed.schema_version !== "figma_plugin_payload_v2") {
          throw new Error("Expected schema_version figma_plugin_payload_v1 or figma_plugin_payload_v2.");
        }
        if (!Array.isArray(parsed.slides) || parsed.slides.length !== 7) {
          throw new Error("Payload must contain exactly 7 slides.");
        }
        return parsed;
      }

      function renderMeta(result) {
        resultMeta.innerHTML = "";
        const items = [
          ["Job", result.job_id || ""],
          ["Page", result.page_name || ""],
          ["Slides", String((result.slide_node_ids || []).length)],
          ["File Key", result.file_key || "Draft / unavailable"],
        ];
        for (const [label, value] of items) {
          const div = document.createElement("div");
          div.innerHTML = `<strong>${label}</strong><br>${value}`;
          resultMeta.appendChild(div);
        }
      }

      function updateResult(result) {
        latestResult = result;
        resultCard.classList.remove("hidden");
        renderMeta(result);
        resultOutput.value = JSON.stringify(result, null, 2);
      }

      function downloadText(filename, text) {
        const blob = new Blob([text], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = filename;
        anchor.click();
        URL.revokeObjectURL(url);
      }

      async function pollNextJob() {
        if (isRendering) {
          setStatus("A render is already in progress.", "");
          return;
        }

        const serverUrl = getServerUrl();
        if (!serverUrl) {
          setStatus("Set the render bridge URL first.", "error");
          return;
        }

        try {
          setStatus("Polling the local render bridge for the next job...", "");
          const response = await fetch(`${serverUrl}/next-job`);
          if (response.status === 204) {
            setStatus("No planned jobs available right now.", "");
            scheduleAutoPoll(5000);
            return;
          }
          if (!response.ok) {
            throw new Error(`Render bridge returned ${response.status}.`);
          }

          const payload = await response.json();
          if (!payload || !payload.payload) {
            throw new Error("Render bridge returned an invalid job payload.");
          }

          currentBridgeJobId = payload.job_id || payload.payload.job_id || null;
          payloadInput.value = JSON.stringify(payload.payload, null, 2);
          currentPayload = payload.payload;
          startRender(payload.payload, true);
        } catch (error) {
          setStatus(error.message || String(error), "error");
          scheduleAutoPoll(5000);
        }
      }

      async function postRenderResult(result) {
        const serverUrl = getServerUrl();
        const response = await fetch(`${serverUrl}/render-result`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(result),
        });
        if (!response.ok) {
          throw new Error(`Unable to post render result (${response.status}).`);
        }
        return response.json();
      }

      async function postRenderError(jobId, errorText) {
        const serverUrl = getServerUrl();
        const response = await fetch(`${serverUrl}/render-error`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ job_id: jobId, error: errorText }),
        });
        if (!response.ok) {
          throw new Error(`Unable to post render error (${response.status}).`);
        }
        return response.json();
      }

      function startRender(payload, fromBridge) {
        resultCard.classList.add("hidden");
        latestResult = null;
        currentPayload = payload;
        isRendering = true;
        setStatus(`Rendering ${payload.job_id} into the current Figma file...`, "");
        if (!fromBridge) {
          currentBridgeJobId = null;
        }
        parent.postMessage({ pluginMessage: { type: "render-payload", payload } }, "*");
      }

      fileInput.addEventListener("change", async (event) => {
        const file = event.target.files && event.target.files[0];
        if (!file) {
          return;
        }
        try {
          const text = await readFile(file);
          const parsed = JSON.parse(text);
          payloadInput.value = JSON.stringify(parsed, null, 2);
          setStatus(`Loaded ${file.name}. Ready to render.`, "");
        } catch (error) {
          setStatus(error.message || String(error), "error");
        }
      });

      formatButton.addEventListener("click", () => {
        try {
          const parsed = parsePayload();
          payloadInput.value = JSON.stringify(parsed, null, 2);
          setStatus("Payload formatted and validated locally.", "");
        } catch (error) {
          setStatus(error.message || String(error), "error");
        }
      });

      renderButton.addEventListener("click", () => {
        try {
          const payload = parsePayload();
          startRender(payload, false);
        } catch (error) {
          setStatus(error.message || String(error), "error");
        }
      });

      pollButton.addEventListener("click", () => {
        void pollNextJob();
      });

      autoButton.addEventListener("click", () => {
        if (autoMode) {
          setAutoMode(false);
          clearAutoTimer();
          setStatus("Auto Mode stopped.", "");
          return;
        }
        setAutoMode(true);
        setStatus("Auto Mode started. Polling the local render bridge...", "");
        void pollNextJob();
      });

      copyResultButton.addEventListener("click", async () => {
        if (!latestResult) {
          return;
        }
        try {
          await navigator.clipboard.writeText(JSON.stringify(latestResult, null, 2));
          setStatus("Render result copied to the clipboard.", "success");
        } catch (error) {
          setStatus(error.message || String(error), "error");
        }
      });

      downloadResultButton.addEventListener("click", () => {
        if (!latestResult) {
          return;
        }
        const filename = `${latestResult.job_id || "carousel-render"}.render-result.json`;
        downloadText(filename, JSON.stringify(latestResult, null, 2));
        setStatus("Render result downloaded.", "success");
      });

      window.onmessage = async (event) => {
        const message = event.data.pluginMessage;
        if (!message) {
          return;
        }

        if (message.type === "status") {
          setStatus(message.message || "Working...", "");
          return;
        }

        if (message.type === "render-complete") {
          isRendering = false;
          updateResult(message.result);
          if (currentBridgeJobId) {
            try {
              await postRenderResult(message.result);
              setStatus("Render complete and posted back to the local bridge.", "success");
            } catch (error) {
              setStatus(error.message || String(error), "error");
            } finally {
              currentBridgeJobId = null;
              currentPayload = null;
              scheduleAutoPoll(1000);
            }
            return;
          }

          currentPayload = null;
          setStatus("Render complete. Download the result JSON and apply it locally.", "success");
          return;
        }

        if (message.type === "render-error") {
          isRendering = false;
          const errorText = message.message || "Render failed.";
          if (currentBridgeJobId) {
            try {
              await postRenderError(currentBridgeJobId, errorText);
              setStatus(`Render failed and was reported to the local bridge: ${errorText}`, "error");
            } catch (error) {
              setStatus(error.message || String(error), "error");
            } finally {
              currentBridgeJobId = null;
              currentPayload = null;
              scheduleAutoPoll(5000);
            }
            return;
          }

          currentPayload = null;
          setStatus(errorText, "error");
        }
      };
    </script>
  </body>
</html>
